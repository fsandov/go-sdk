name: Auto Release After PR Merge

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  if_merged:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN_ACTIONS }}

      - name: Extract version from branch name
        id: extract_version
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$BRANCH_NAME" =~ ^release\/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION=${BRANCH_NAME#release/}
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          else
            echo "Branch name does not match the release pattern."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.TOKEN_ACTIONS }}
        run: |
          gh release create "v$VERSION" \
            --title "Release v$VERSION" \
            --generate-notes

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          token: ${{ secrets.TOKEN_ACTIONS }}
          script: |
            const version = process.env.VERSION;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const url = `https://github.com/${repo}/releases/tag/v${version}`;
            const body = [
              `### Release Information - [${repo}](https://github.com/${repo})`,
              `A new release has been created:`,
              `- **Version**: [Release v${version}](${url})`,
              `- **Changes**: Refer to the [PR description](${context.payload.pull_request.html_url})`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Send notification to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg v "$VERSION" \
            --arg pr "${{ github.event.pull_request.html_url }}" \
            --arg rel "$RELEASE_URL" \
            '{
              username: "Release Bot",
              content: "### Release Information - [\($repo)](https://github.com/\($repo))\n- **Version**: v\($v)\n- **PR**: \($pr)\n- **Release**: \($rel)"
            }')
          curl -sS -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"

      - name: Delete release branch
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          if git ls-remote --exit-code origin "$BRANCH_NAME" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH_NAME"
          fi
